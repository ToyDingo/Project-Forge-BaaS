spring:
  application:
    name: forge-backend
  datasource:
    url: ${FORGE_DATASOURCE_URL:jdbc:postgresql://localhost:5432/app}
    username: ${FORGE_DATASOURCE_USERNAME:app}
    password: ${FORGE_DATASOURCE_PASSWORD:app}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: ${FORGE_SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized

# Set forge.steam.dev-stub-enabled=true (or FORGE_STEAM_DEV_STUB_ENABLED=true) for local Postman/tests without calling Valve.
# DEV ONLY — remove reliance on the stub once real Steam validation is fully wired and tested.
forge:
  jwt:
    issuer: ${FORGE_JWT_ISSUER:https://forge.local}
    audience: ${FORGE_JWT_AUDIENCE:forge-clients}
    access-token-ttl-seconds: ${FORGE_JWT_ACCESS_TTL_SECONDS:3600}
    private-key-pem-path: ${FORGE_JWT_PRIVATE_KEY_PEM:classpath:keys/dev-private.pem}
    public-key-pem-path: ${FORGE_JWT_PUBLIC_KEY_PEM:classpath:keys/dev-public.pem}
  steam:
    request-timeout-seconds: ${FORGE_STEAM_TIMEOUT_SECONDS:10}
    base-url: ${FORGE_STEAM_BASE_URL:https://api.steampowered.com}
    dev-stub-enabled: ${FORGE_STEAM_DEV_STUB_ENABLED:true}
  matchmaking:
    queue-timeout-seconds: ${FORGE_MATCHMAKING_QUEUE_TIMEOUT_SECONDS:60}
    heartbeat-interval-seconds: ${FORGE_MATCHMAKING_HEARTBEAT_INTERVAL_SECONDS:10}
    stale-heartbeat-threshold: ${FORGE_MATCHMAKING_STALE_HEARTBEAT_THRESHOLD:2}
    notification-retry-count: ${FORGE_MATCHMAKING_NOTIFICATION_RETRY_COUNT:3}
    notification-retry-interval-seconds: ${FORGE_MATCHMAKING_NOTIFICATION_RETRY_INTERVAL_SECONDS:5}
