spring:
  datasource:
    url: jdbc:h2:mem:forge_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: false

forge:
  jwt:
    issuer: https://forge.test
    audience: forge-test
    access-token-ttl-seconds: 3600
    private-key-pem-path: classpath:keys/test-private.pem
    public-key-pem-path: classpath:keys/test-public.pem
  steam:
    request-timeout-seconds: 10
    base-url: https://api.steampowered.com
    dev-stub-enabled: false
